# Verify the workflow package builds on every push and pull request.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build .alfredworkflow
        run: python3 scripts/build-workflow.py

      - name: List artifact
        run: ls -la Repos-*.alfredworkflow
